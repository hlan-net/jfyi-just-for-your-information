name: Pages

on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - "helm/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site + chart repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Helm lint
        run: helm lint helm/jfyi-mcp-server

      - name: Assemble staging directory
        run: |
          set -euo pipefail
          mkdir -p _site/charts
          cp -r pages/. _site/
          helm package helm/jfyi-mcp-server --destination _site/charts
          helm repo index _site/charts --url https://jfyi.hlan.net/charts
          ls -laR _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
