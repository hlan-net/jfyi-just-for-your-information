{{- if not .Values.jwtSecret.existingSecret }}
{{- $secretName := printf "%s-jwt" (include "jfyi-mcp-server.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $jwtSecret := "" }}
{{- if $existing }}
{{- $jwtSecret = index $existing.data "JFYI_JWT_SECRET" | b64dec }}
{{- else if .Values.jwtSecret.value }}
{{- $jwtSecret = .Values.jwtSecret.value }}
{{- else }}
{{- $jwtSecret = randAlphaNum 64 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "jfyi-mcp-server.labels" . | nindent 4 }}
  annotations:
    # Survive `helm uninstall` so the JWT signing key is generated exactly once
    # and reused on every future install/upgrade via the lookup above. Without
    # this, uninstall+install would mint a fresh key and invalidate every
    # outstanding MCP token and dashboard session.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  JFYI_JWT_SECRET: {{ $jwtSecret | quote }}
{{- end }}
