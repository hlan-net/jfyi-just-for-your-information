apiVersion: v1
kind: Service
metadata:
  name: {{ include "jfyi-mcp-server.fullname" . }}-service
  labels:
    {{- include "jfyi-mcp-server.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.mcpPort }}
      targetPort: mcp
      protocol: TCP
      name: mcp
  selector:
    {{- include "jfyi-mcp-server.selectorLabels" . | nindent 4 }}
