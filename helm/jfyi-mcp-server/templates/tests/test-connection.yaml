apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "jfyi-mcp-server.fullname" . }}-test-connection"
  labels:
    {{- include "jfyi-mcp-server.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command:
        - sh
        - -c
        - |
          set -eu
          url="http://{{ include "jfyi-mcp-server.fullname" . }}-service:{{ .Values.service.mcpPort }}/api/profile/rules"
          echo "GET $url"
          curl --fail --max-time 10 --retry 5 --retry-delay 3 --retry-connrefused "$url"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
