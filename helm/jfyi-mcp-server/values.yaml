# Default values for jfyi-mcp-server

replicaCount: 1

image:
  repository: ghcr.io/hlan-net/jfyi-just-for-your-information
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to .Chart.AppVersion when empty

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  mcpPort: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: jfyi.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: jfyi-tls
  #   hosts:
  #     - jfyi.local

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ~

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 2Gi
  mountPath: /data
  annotations: {}

env:
  JFYI_DATA_DIR: /data
  JFYI_DB_PATH: /data/jfyi.db
  JFYI_MCP_PORT: "8080"
  PYTHONDONTWRITEBYTECODE: "1"
  # JFYI_DLP_ENABLED: "true"   # Set to "false" to bypass PII redaction in local dev

# JWT / session secret — stable across pod restarts and upgrades.
# If existingSecret is set, the chart reads JFYI_JWT_SECRET from that Secret.
# Otherwise a Secret named <fullname>-jwt is created automatically; the value
# is generated once and preserved across Helm upgrades via the lookup function.
jwtSecret:
  # Name of a pre-existing Secret that contains the key JFYI_JWT_SECRET.
  # Leave empty to let the chart manage the Secret for you.
  existingSecret: ""
  # Optional: set an explicit secret value. If empty, a random 64-char value
  # is generated on first install and preserved across upgrades.
  value: ""

# List of envFrom sources (configMapRef or secretRef) injected into the container.
# Example: [{ secretRef: { name: jfyi-jwt } }]
extraEnvFrom: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /api/system/status
    port: mcp
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/system/status
    port: mcp
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# ChromaDB sibling pod for semantic search. Disabled by default — when enabled,
# the chart deploys an upstream chromadb/chroma container with its own PVC and
# wires JFYI_ENABLE_VECTOR_DB=true plus JFYI_CHROMADB_HOST/PORT into the main
# jfyi container. Embeddings are computed server-side using ChromaDB's default
# ONNX-based all-MiniLM-L6-v2 EF (no torch in the JFYI image).
chromadb:
  enabled: false
  image:
    repository: chromadb/chroma
    tag: "0.5.23"
    pullPolicy: IfNotPresent
  # The upstream chromadb/chroma image runs its log writer against
  # /chroma/chroma.log inside the image filesystem (not the PVC), so it must
  # run as root. Override per-deployment if you fork to a non-root variant.
  podSecurityContext: {}
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  extraEnv: {}
