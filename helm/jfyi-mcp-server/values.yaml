# Default values for jfyi-mcp-server

replicaCount: 1

image:
  repository: ghcr.io/hlan-net/jfyi-just-for-your-information
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to .Chart.AppVersion when empty

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  mcpPort: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: jfyi.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: jfyi-tls
  #   hosts:
  #     - jfyi.local

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ~

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 2Gi
  mountPath: /data
  annotations: {}

env:
  JFYI_DATA_DIR: /data
  JFYI_DB_PATH: /data/jfyi.db
  JFYI_MCP_PORT: "8080"
  PYTHONDONTWRITEBYTECODE: "1"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /api/profile/rules
    port: mcp
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/profile/rules
    port: mcp
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# Install the [vector] extra to enable ChromaDB + sentence-transformers.
# Requires a larger memory limit (~2Gi).
vector:
  enabled: false
