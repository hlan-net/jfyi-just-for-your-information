<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JFYI Dashboard — Just For Your Information</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0d1117; --surface: #161b22; --border: #30363d;
        --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
        --green: #3fb950; --orange: #d29922; --red: #f85149;
        --purple: #bc8cff; --font: 'Segoe UI', system-ui, sans-serif;
      }
      body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
      header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
      header h1 { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
      header span { color: var(--muted); font-size: 0.85rem; }
      .badge { background: #1f6feb22; border: 1px solid #1f6feb55; color: var(--accent); border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; }
      nav { display: flex; gap: 0; padding: 0 2rem; background: var(--surface); border-bottom: 1px solid var(--border); }
      nav a { text-decoration: none; color: var(--muted); padding: 0.8rem 1.2rem; cursor: pointer; font-size: 0.9rem; border-bottom: 2px solid transparent; transition: all 0.2s; }
      nav a:hover { color: var(--text); }
      nav a.router-link-active { color: var(--accent); border-bottom-color: var(--accent); }
      main { max-width: 1100px; margin: 2rem auto; padding: 0 2rem; }
      .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
      .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--text); }
      .btn { background: var(--accent); color: #0d1117; border: none; border-radius: 6px; padding: 0.4rem 0.9rem; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: opacity 0.2s; text-decoration: none; display: inline-block;}
      .btn:hover { opacity: 0.85; }
      .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
      .btn-danger { background: none; border: 1px solid var(--red); color: var(--red); }
      .btn-danger:hover { background: #2d121422; }
      .form-row { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; align-items: center;}
      input[type=text], input[type=number], input[type=password], select {
        background: #21262d; border: 1px solid var(--border); color: var(--text);
        border-radius: 6px; padding: 0.4rem 0.75rem; font-size: 0.9rem; flex: 1; min-width: 120px;
      }
      input:focus, select:focus { outline: 2px solid var(--accent); }
      .empty { text-align: center; padding: 3rem; color: var(--muted); }
      .loading { color: var(--muted); font-size: 0.9rem; padding: 1rem; }
      #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #238636; color: #fff; padding: 0.7rem 1.2rem; border-radius: 6px; font-size: 0.9rem; display: none; z-index: 999; }
      table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      th { text-align: left; padding: 0.5rem 0.75rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
      td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #21262d; }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: #1f2937; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
