<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JFYI Dashboard — Just For Your Information</title>
<script src="https://unpkg.com/vue@3.5.13/dist/vue.global.js" integrity="sha384-G++pO/TtP6SeNEBuO/CYuppmlcEhA0Rj9IcY5feVJXhyYraEA8CKVZV38iDXLTyJ" crossorigin="anonymous"></script>
<script src="https://unpkg.com/vue-router@4.5.0/dist/vue-router.global.js" integrity="sha384-k3ll1ynQm098WjllQ/lUsqPGGlfCQ0PD4T4xZmzCfXjkkT9pzpfbHb4vN9Xx+o3b" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --green-rgb: 63, 185, 80;
    --orange: #d29922; --orange-rgb: 210, 153, 34;
    --red: #f85149; --red-rgb: 248, 81, 73;
    --purple: #bc8cff; --purple-rgb: 188, 140, 255;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  .header-left { display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.4rem; font-weight: 700; color: var(--accent); cursor: pointer; }
  header span.subtitle { color: var(--muted); font-size: 0.85rem; }
  .badge { background: #1f6feb22; border: 1px solid #1f6feb55; color: var(--accent); border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; }
  
  nav { display: flex; gap: 0; padding: 0 2rem; background: var(--surface); border-bottom: 1px solid var(--border); }
  nav a { color: var(--muted); padding: 0.8rem 1.2rem; font-size: 0.9rem; border-bottom: 2px solid transparent; transition: all 0.2s; text-decoration: none; }
  nav a:hover { color: var(--text); text-decoration: none; }
  nav a.router-link-active { color: var(--accent); border-bottom-color: var(--accent); }
  
  main { max-width: 1100px; margin: 2rem auto; padding: 0 2rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: var(--text); }
  .card p.desc { color:var(--muted); font-size:0.85rem; margin-bottom:1rem; }
  
  .btn { background: var(--accent); color: #0d1117; border: none; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: opacity 0.2s; text-decoration: none; display: inline-block; text-align: center; }
  .btn:hover { opacity: 0.85; text-decoration: none; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
  .btn-danger { background: none; border: 1px solid var(--red); color: var(--red); }
  .btn-danger:hover { background: #2d121422; }
  .btn-login { width: 100%; margin-bottom: 0.5rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem; }
  
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text); }
  input[type=text], input[type=password], input[type=number], select {
    background: #21262d; border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.9rem; width: 100%;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); }
  
  .setup-container, .login-container { max-width: 520px; margin: 4rem auto; }
  .setup-container .card, .login-container .card { padding: 2rem; }
  .setup-header { text-align: center; margin-bottom: 2rem; }
  .setup-header h1 { font-size: 1.8rem; color: var(--accent); margin-bottom: 0.5rem; }
  
  .provider-select { display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; margin-bottom: 0.75rem; transition: all 0.2s; background: var(--surface); }
  .provider-select:hover { border-color: #4b535d; background: #1f2937; }
  .provider-select.active { border-color: var(--accent); background: #1f6feb11; }
  
  .guidance-box { background: #1f2937; border-left: 4px solid var(--accent); padding: 1rem 1.5rem; border-radius: 4px; margin-bottom: 1.5rem; font-size: 0.9rem; }
  .guidance-box h3 { font-size: 0.95rem; margin-bottom: 0.5rem; color: var(--text); }
  .guidance-box ol { padding-left: 1.5rem; color: var(--text); margin-bottom: 0; }
  .guidance-box li { margin-bottom: 0.4rem; }
  .guidance-box code { background: #0d1117; padding: 0.1rem 0.4rem; border-radius: 4px; font-family: monospace; color: var(--accent); font-size: 0.85em; }
  
  /* Tables & Pills from old UI */
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th { text-align: left; padding: 0.5rem 0.75rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #21262d; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1f2937; }
  .pill { display: inline-block; border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; font-weight: 500; }
  .pill-green { background: #23312a; color: var(--green); }
  .pill-orange { background: #2d2208; color: var(--orange); }
  .pill-red { background: #2d1214; color: var(--red); }
  .pill-blue { background: #132030; color: var(--accent); }
  .pill-purple { background: #231a30; color: var(--purple); }
  
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  .empty .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; color: var(--muted); gap: 1rem; }
  .spinner { border: 3px solid #21262d; border-top: 3px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 2rem 1rem; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; max-width: 560px; width: 100%; }
</style>
</head>
<body>
<div id="app"></div>

<!-- Vue App Templates -->
<script type="text/x-template" id="app-template">
  <div v-if="loading" class="loading-screen">
    <div class="spinner"></div>
    <p>Loading JFYI...</p>
  </div>
  <div v-else>
    <header v-if="!isSetupOrLogin">
      <div class="header-left">
        <h1 @click="$router.push('/')">⚡ JFYI Dashboard</h1>
        <span class="subtitle">Just For Your Information — MCP Server &amp; Analytics Hub</span>
        <span class="badge" v-if="system.version">v{{ system.version }}</span>
      </div>
      <div>
        <span v-if="user" style="margin-right: 1rem; font-size: 0.9rem;">
          {{ user.name || user.email }} <span v-if="user.is_admin" class="pill pill-purple">Admin</span>
        </span>
        <button v-if="!system.single_user_mode" @click="logout" class="btn btn-outline" style="padding: 0.3rem 0.7rem; font-size: 0.8rem;">Logout</button>
      </div>
    </header>
    
    <nav v-if="!isSetupOrLogin">
      <router-link to="/connect">🔌 How to Connect</router-link>
      <router-link to="/profile">👤 Developer Profile</router-link>
      <router-link to="/analytics">📊 Agent Analytics</router-link>
      <router-link to="/developer">📈 My Analytics</router-link>
      <router-link to="/memory">🧠 Memory Explorer</router-link>
      <router-link v-if="user?.is_admin" to="/admin">🛡️ Admin</router-link>
    </nav>
    
    <main>
      <router-view></router-view>
    </main>
  </div>
</script>

<script type="text/x-template" id="idp-wizard-template">
  <div>
    <div class="card" v-if="step === 1">
      <h2>Step 1: Choose an Identity Provider</h2>
      <p class="desc">JFYI uses OAuth 2.0 / OIDC to authenticate users. Select the provider to configure.</p>

      <div class="form-group" style="margin-top: 1.5rem;">
        <div class="provider-select" :class="{active: form.provider === 'github'}" @click="pick('github')">
          <span style="font-size: 1.8rem">🐙</span>
          <div><strong style="color:var(--text);font-size:1.05rem;">GitHub</strong><div style="font-size:0.85rem;color:var(--muted)">Configure a GitHub OAuth App</div></div>
        </div>
        <div class="provider-select" :class="{active: form.provider === 'google'}" @click="pick('google')">
          <span style="font-size: 1.8rem">🌐</span>
          <div><strong style="color:var(--text);font-size:1.05rem;">Google</strong><div style="font-size:0.85rem;color:var(--muted)">Configure Google Cloud OAuth</div></div>
        </div>
        <div class="provider-select" :class="{active: form.provider === 'entra'}" @click="pick('entra')">
          <span style="font-size: 1.8rem">🏢</span>
          <div><strong style="color:var(--text);font-size:1.05rem;">Microsoft Entra ID</strong><div style="font-size:0.85rem;color:var(--muted)">Configure Azure App Registration</div></div>
        </div>
        <div class="provider-select" :class="{active: form.provider === 'custom_oidc'}" @click="pick('custom_oidc')">
          <span style="font-size: 1.8rem">🔐</span>
          <div><strong style="color:var(--text);font-size:1.05rem;">Custom OIDC</strong><div style="font-size:0.85rem;color:var(--muted)">Any OpenID Connect-compatible provider</div></div>
        </div>
      </div>

      <div style="margin-top:2rem;">
        <button class="btn" style="width:100%;padding:0.75rem;" @click="goStep2" :disabled="!form.provider">Next Step &rarr;</button>
      </div>
    </div>

    <div class="card" v-if="step === 2">
      <h2>Step 2: Configure {{ providerLabel }}</h2>

      <div class="guidance-box">
        <template v-if="form.provider === 'github'">
          <h3>How to get GitHub credentials:</h3>
          <ol>
            <li>Go to <strong>GitHub Settings &rarr; Developer settings &rarr; OAuth Apps</strong>.</li>
            <li>Click <strong>New OAuth App</strong>.</li>
            <li>Set <strong>Homepage URL</strong> to <code>{{ origin }}</code>.</li>
            <li>Set <strong>Authorization callback URL</strong> to <code>{{ origin }}/auth/callback/github</code>.</li>
            <li>Click <strong>Register application</strong>, then copy the <strong>Client ID</strong> and generate a <strong>Client secret</strong>.</li>
          </ol>
        </template>
        <template v-else-if="form.provider === 'google'">
          <h3>How to get Google credentials:</h3>
          <ol>
            <li>Open the <a href="https://console.cloud.google.com" target="_blank">Google Cloud Console</a> &rarr; <strong>APIs &amp; Services &rarr; Credentials</strong>.</li>
            <li>Click <strong>Create Credentials &rarr; OAuth client ID</strong> (Web application).</li>
            <li>Add authorized redirect URI: <code>{{ origin }}/auth/callback/google</code>.</li>
            <li>Click <strong>Create</strong> and copy the Client ID and Secret.</li>
          </ol>
        </template>
        <template v-else-if="form.provider === 'entra'">
          <h3>How to get Entra ID (Azure) credentials:</h3>
          <ol>
            <li>Go to the <a href="https://portal.azure.com" target="_blank">Azure Portal</a> &rarr; <strong>Microsoft Entra ID &rarr; App registrations &rarr; New registration</strong>.</li>
            <li>Set Redirect URI type to <strong>Web</strong>: <code>{{ origin }}/auth/callback/entra</code>.</li>
            <li>Register and copy the <strong>Application (client) ID</strong>.</li>
            <li>Go to <strong>Certificates &amp; secrets</strong>, create a new client secret, and copy its <strong>Value</strong>.</li>
          </ol>
        </template>
        <template v-else-if="form.provider === 'custom_oidc'">
          <h3>Custom OIDC Provider setup:</h3>
          <ol>
            <li>Register a new OAuth / OIDC application in your identity provider's admin console.</li>
            <li>Enter the provider's <strong>OIDC Discovery URL</strong> (ends in <code>/.well-known/openid-configuration</code>) below.</li>
            <li>Copy the <strong>Client ID</strong> and <strong>Client Secret</strong> from your provider.</li>
            <li>After saving, the exact <strong>callback URL</strong> will appear in the Identity Providers table — copy it into your OIDC provider app.</li>
          </ol>
        </template>
      </div>

      <form @submit.prevent="submit">
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" v-model="form.name" required placeholder="e.g. GitHub, Acme Corp SSO" />
        </div>

        <div class="form-group" v-if="form.provider === 'custom_oidc'">
          <label>OIDC Discovery URL</label>
          <input type="text" v-model="form.discovery_url" required placeholder="https://your-idp.example.com/.well-known/openid-configuration" />
        </div>

        <div class="form-group">
          <label>Client ID</label>
          <input type="text" v-model="form.client_id" required placeholder="Paste Client ID here" />
        </div>

        <div class="form-group">
          <label>Client Secret</label>
          <input type="password" v-model="form.client_secret" required placeholder="Paste Client Secret here" />
        </div>

        <div class="form-group" v-if="form.provider === 'entra'">
          <label>Secret ID <span style="color:var(--muted);font-weight:400;font-size:0.85rem;">(optional — from Entra ID &rarr; Certificates &amp; secrets)</span></label>
          <input type="text" v-model="form.client_secret_id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
        </div>

        <div style="display:flex;gap:1rem;margin-top:2rem;">
          <button type="button" class="btn btn-outline" @click="step = 1">&larr; Back</button>
          <button type="submit" class="btn" style="flex:1" :disabled="saving">
            {{ saving ? 'Saving...' : 'Save Provider' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</script>

<script type="text/x-template" id="setup-template">
  <div class="setup-container">
    <div class="setup-header">
      <h1>Welcome to JFYI</h1>
      <p style="color: var(--muted)">Let's set up your first Identity Provider</p>
    </div>
    <idp-wizard endpoint="/api/system/idp" :on-saved="onSaved" />
  </div>
</script>

<script type="text/x-template" id="login-template">
  <div class="login-container">
    <div class="setup-header">
      <h1>Sign in to JFYI</h1>
      <p style="color: var(--muted)" v-if="system.has_admin">Welcome back.</p>
      <p style="color: var(--accent)" v-else>The first user to sign in will automatically become the Admin.</p>
    </div>
    
    <div v-if="errorMsg" style="background:#2d1214;border:1px solid var(--red);border-radius:8px;padding:1rem;margin-bottom:1rem;color:var(--red);text-align:center;">
      {{ errorMsg }}
    </div>

    <div class="card" style="text-align: center;">
      <h2 style="margin-bottom: 1.5rem;">Choose a Provider</h2>

      <div v-if="system.providers && system.providers.length > 0">
        <a v-for="p in system.providers" :key="p.id" :href="'/auth/login/' + p.auth_key" class="btn btn-login btn-outline">
          <span v-if="p.provider === 'github'">🐙</span>
          <span v-if="p.provider === 'google'">🌐</span>
          <span v-if="p.provider === 'entra'">🏢</span>
          <span v-if="p.provider === 'custom_oidc'">🔐</span>
          Sign in with {{ p.name }}
        </a>
      </div>
      <div v-else class="empty" style="padding: 1rem;">
        No identity providers configured.
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="profile-template">
  <div>
    <div class="card">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:0.5rem;">
        <h2 style="margin:0;">Your Developer Constitution</h2>
        <div style="display:flex;gap:0.5rem;">
          <button v-if="rules.length >= 2" @click="showSynthesis = true" class="btn btn-outline" style="padding:0.25rem 0.65rem;font-size:0.8rem;">Synthesize</button>
          <button v-if="rules.length > 0" @click="copyRules" class="btn btn-outline" style="padding:0.25rem 0.65rem;font-size:0.8rem;">
            {{ copied ? 'Copied!' : 'Copy all' }}
          </button>
        </div>
      </div>
      <p class="desc">Cross-project, cross-agent rules describing how you work. Injected into every AI assistant's context at session start — not project-specific notes, but your developer DNA.</p>

      <div v-if="loading" class="loading-screen" style="height: 100px;">Loading rules...</div>
      <div v-else-if="rules.length === 0" class="empty">
        <div class="icon">🧬</div>No profile rules yet.
      </div>
      <div v-else>
        <table style="margin-bottom: 1rem;">
          <thead>
            <tr>
              <th>Category</th>
              <th>Rule</th>
              <th>Confidence</th>
              <th>Source</th>
              <th>Agent</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="r in rules" :key="r.id">
              <td><span :class="'pill pill-' + categoryColor(r.category)">{{ r.category }}</span></td>
              <td>{{ r.text }}</td>
              <td>{{ (r.confidence * 100).toFixed(0) }}%</td>
              <td><span :class="r.source === 'synthesized' ? 'pill pill-orange' : r.source === 'manual' ? 'pill pill-purple' : 'pill pill-green'">{{ r.source }}</span></td>
              <td style="color: var(--muted); font-size: 0.8rem;">{{ r.agent_name || '—' }}</td>
              <td style="text-align: right;"><button class="btn-danger" style="border:none; cursor:pointer;" @click="deleteRule(r.id)">×</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <rule-synthesis :show="showSynthesis" :rules="rules" @close="showSynthesis = false" @applied="onApplied" />
  </div>
</script>

<script type="text/x-template" id="rule-synthesis-template">
  <div v-if="show" class="modal-overlay" @click.self="close">
    <div class="modal-box" style="max-width:680px;width:100%;max-height:85vh;overflow-y:auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <h2 style="margin:0;font-size:1.1rem;">Rule Synthesis</h2>
        <button @click="close" style="background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;">×</button>
      </div>

      <!-- Step indicator -->
      <div style="display:flex;gap:0.4rem;margin-bottom:1.25rem;">
        <span :class="['pill', step >= 1 ? 'pill-purple' : '']">1. Select</span>
        <span :class="['pill', step >= 2 ? 'pill-purple' : '']">2. Model</span>
        <span :class="['pill', step >= 3 ? 'pill-purple' : '']">3. Preview</span>
      </div>

      <!-- Step 1: Rule selection -->
      <div v-if="step === 1">
        <p class="desc" style="margin-bottom:0.75rem;">Select rules to include and rate their importance. High-priority rules will be preserved most faithfully.</p>
        <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
          <button @click="selectAll" class="btn btn-outline" style="font-size:0.8rem;padding:0.2rem 0.6rem;">Select all</button>
          <button @click="deselectAll" class="btn btn-outline" style="font-size:0.8rem;padding:0.2rem 0.6rem;">Clear</button>
        </div>
        <div v-for="r in rules" :key="r.id" style="display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0;border-bottom:1px solid var(--border);">
          <input type="checkbox" :id="'sr'+r.id" v-model="selected[r.id]" style="flex-shrink:0;width:1rem;height:1rem;cursor:pointer;" />
          <label :for="'sr'+r.id" style="flex:1;cursor:pointer;font-size:0.9rem;line-height:1.4;">
            <span :class="'pill pill-' + catColor(r.category)" style="margin-right:0.35rem;">{{ r.category }}</span>{{ r.text }}
          </label>
          <div style="flex-shrink:0;font-size:1.15rem;letter-spacing:1px;">
            <span v-for="s in 5" :key="s" @click="setPriority(r.id, s)"
              :style="{cursor:'pointer', color: (priorities[r.id]||3) >= s ? 'var(--orange)' : 'var(--border)'}">★</span>
          </div>
        </div>
        <div style="margin-top:1rem;display:flex;justify-content:flex-end;">
          <button @click="step = 2" class="btn" :disabled="selectedCount < 2">
            Next — {{ selectedCount }} rule{{ selectedCount !== 1 ? 's' : '' }} selected
          </button>
        </div>
      </div>

      <!-- Step 2: Model configuration -->
      <div v-if="step === 2">
        <p class="desc" style="margin-bottom:1rem;">Configure the model that will synthesize your rules. The API key is stored on your JFYI instance only.</p>
        
        <div style="margin-bottom:1.25rem; padding:0.75rem; background:rgba(var(--purple-rgb), 0.05); border:1px dashed var(--purple); border-radius:4px; display:flex; flex-direction:column; gap:0.5rem;">
          <div style="font-size:0.85rem; color:var(--purple); font-weight:500;">Quick setup for local models:</div>
          <div style="display:flex; gap:0.5rem;">
            <button @click="useLocalHailo" class="btn btn-outline" style="flex:1; font-size:0.75rem; padding:0.3rem 0.6rem; border-color:var(--purple); color:var(--purple);">Local Hailo (10H)</button>
            <button @click="useLocalOllama" class="btn btn-outline" style="flex:1; font-size:0.75rem; padding:0.3rem 0.6rem; border-color:var(--purple); color:var(--purple);">Standard Ollama</button>
          </div>
        </div>

        <div class="form-group">
          <label>Provider</label>
          <select v-model="cfg.provider">
            <option value="anthropic">Anthropic</option>
            <option value="openai">OpenAI-compatible (OpenAI, Groq, Ollama…)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Model</label>
          <input type="text" v-model="cfg.model"
            :placeholder="cfg.provider === 'anthropic' ? 'claude-haiku-4-5-20251001' : 'gpt-4o-mini'" />
        </div>
        <div class="form-group">

      saving.value = true;
      try {
        const payload = { provider: form.provider, name: form.name, client_id: form.client_id, client_secret: form.client_secret };
        if (form.provider === 'custom_oidc') {
          payload.discovery_url = form.discovery_url;
        }
        if (form.client_secret_id) {
          payload.client_secret_id = form.client_secret_id;
        }
        const res = await fetch(API + props.endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          props.onSaved();
        } else {
          const err = await res.json().catch(() => ({}));
          alert(err.detail || 'Failed to configure IdP');
        }
      } catch (e) {
        alert('Error configuring IdP');
      } finally {
        saving.value = false;
      }
    };

    return { step, form, saving, origin, providerLabel, pick, goStep2, submit };
  }
};

const SetupWizard = {
  template: '#setup-template',
  setup() {
    const router = VueRouter.useRouter();
    const onSaved = async () => {
      const status = await fetch(API + '/api/system/status').then(r => r.json());
      Object.assign(globalState.system, status);
      router.push('/login');
    };
    return { onSaved };
  }
};

const Login = {
  template: '#login-template',
  setup() {
    const route = VueRouter.useRoute();
    const errorMsg = computed(() => {
      if (route.query.error === 'registration_closed') {
        return 'Registration is currently closed. Contact an admin to get access.';
      }
      return null;
    });
    return { system: globalState.system, errorMsg };
  }
};

const Connect = {
  template: '#connect-template',
  setup() {
    const origin = globalThis.location.origin;
    const token = ref('');
    const loading = ref(false);
    const copied = ref(false);
    
    const generateToken = async () => {
      loading.value = true;
      try {
        const res = await fetch(API + '/api/keys', { method: 'POST' });
        if (res.ok) {
          const data = await res.json();
          token.value = data.mcp_api_key;
          copied.value = false;
        }
      } finally {
        loading.value = false;
      }
    };
    
    const copyToken = () => {
      navigator.clipboard.writeText(token.value).then(() => {
        copied.value = true;
        setTimeout(() => copied.value = false, 2000);
      }).catch(() => alert('Failed to copy to clipboard.'));
    };

    const copiedConfig = ref(false);

    const copyConfig = () => {
      const configText = JSON.stringify({
        mcpServers: {
          'jfyi-remote': {
            transport: 'sse',
            url: `${origin}/mcp/sse`,
            headers: {
              Authorization: `Bearer ${token.value || '<YOUR_TOKEN_HERE>'}`,
            },
          },
        },
      }, null, 2);
      navigator.clipboard.writeText(configText).then(() => {
        copiedConfig.value = true;
        setTimeout(() => copiedConfig.value = false, 2000);
      }).catch(() => alert('Failed to copy to clipboard.'));
    };
    
    return { origin, token, loading, copied, copiedConfig, generateToken, copyToken, copyConfig };
  }
};

const RuleSynthesis = {
  template: '#rule-synthesis-template',
  props: ['show', 'rules'],
  emits: ['close', 'applied'],
  setup(props, { emit }) {
    const step = ref(1);
    const selected = reactive({});
    const priorities = reactive({});
    const cfg = reactive({ provider: 'anthropic', model: '', api_key: '', base_url: '' });
    const savedCfg = reactive({ configured: false, has_key: false, provider: '', model: '', base_url: '' });
    const showKey = ref(false);
    const synthesizing = ref(false);
    const applying = ref(false);
    const synthesized = ref([]);
    const error = ref('');

    const selectedCount = computed(() => Object.values(selected).filter(Boolean).length);
    const selectedIds = computed(() =>
      Object.entries(selected).filter(([, v]) => v).map(([k]) => Number.parseInt(k))
    );

    const catColor = (c) => ({ style:'orange', architecture:'purple', testing:'green', docs:'blue' }[c] || 'blue');
    const selectAll = () => props.rules.forEach(r => { selected[r.id] = true; });
    const deselectAll = () => props.rules.forEach(r => { selected[r.id] = false; });
    const setPriority = (id, stars) => { priorities[id] = stars; };

    const useLocalHailo = () => {
      cfg.provider = 'openai';
      cfg.model = 'llama3.2:1b';
      cfg.base_url = 'http://{host}:8000/v1';
      if (!cfg.api_key && !savedCfg.has_key) cfg.api_key = 'ollama';
    };

    const useLocalOllama = () => {
      cfg.provider = 'openai';
      cfg.model = 'llama3';
      cfg.base_url = 'http://localhost:11434/v1';
      if (!cfg.api_key && !savedCfg.has_key) cfg.api_key = 'ollama';
    };

    const resolvedUrl = computed(() => {
      if (!cfg.base_url) return '';
      return cfg.base_url.replace('{host}', window.location.hostname || 'localhost');
    });

    const loadSavedCfg = async () => {
      const res = await fetch(API + '/api/profile/synthesis-config');
      if (res.ok) {
        const data = await res.json();
        Object.assign(savedCfg, data);
        if (data.configured) {
          cfg.provider = data.provider || 'anthropic';
          cfg.model = data.model || '';
          cfg.base_url = data.base_url || '';
        }
      }
    };

    watch(() => props.show, (val) => { if (val) { step.value = 1; error.value = ''; synthesized.value = []; loadSavedCfg(); } });

    const runSynthesis = async () => {
      synthesizing.value = true;
      error.value = '';
      try {
        const saveBody = { provider: cfg.provider, model: cfg.model, base_url: resolvedUrl.value || null };
        if (cfg.api_key) saveBody.api_key = cfg.api_key;
        const saveRes = await fetch(API + '/api/profile/synthesis-config', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(saveBody),
        });
        if (!saveRes.ok) { const d = await saveRes.json(); throw new Error(d.detail || 'Failed to save config'); }
        Object.assign(savedCfg, { configured: true, has_key: true, provider: cfg.provider, model: cfg.model });

        const prioritiesObj = {};
        props.rules.forEach(r => { prioritiesObj[r.id] = priorities[r.id] || 3; });
        const synthRes = await fetch(API + '/api/profile/notes/synthesize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ note_ids: selectedIds.value, priorities: prioritiesObj }),
        });
        if (!synthRes.ok) { const d = await synthRes.json(); throw new Error(d.detail || 'Synthesis failed'); }
        const data = await synthRes.json();
        synthesized.value = data.synthesized;
        step.value = 3;
      } catch (e) {
        error.value = e.message || 'Synthesis failed';
      } finally {
        synthesizing.value = false;
      }
    };

    const _apply = async (archiveIds) => {
      applying.value = true;
      error.value = '';
      try {
        const res = await fetch(API + '/api/profile/notes/synthesize/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ synthesized: synthesized.value, archive_ids: archiveIds }),
        });
        if (!res.ok) { const d = await res.json(); throw new Error(d.detail || 'Apply failed'); }
        emit('applied');
        close();
      } catch (e) {
        error.value = e.message || 'Apply failed';
      } finally {
        applying.value = false;
      }
    };

    const applyAndArchive = () => _apply(selectedIds.value);
    const applyOnly = () => _apply([]);

    const close = () => {
      step.value = 1;
      error.value = '';
      synthesized.value = [];
      emit('close');
    };

    return {
      step, selected, priorities, cfg, savedCfg, showKey,
      synthesizing, applying, synthesized, error,
      selectedCount, catColor,
      selectAll, deselectAll, setPriority, runSynthesis,
      useLocalHailo, useLocalOllama, resolvedUrl,
      applyAndArchive, applyOnly, close,
    };
  }
};

const Profile = {
  template: '#profile-template',
  setup() {
    const rules = ref([]);
    const loading = ref(true);
    const copied = ref(false);
    const showSynthesis = ref(false);

    const loadRules = async () => {
      loading.value = true;
      try {
        const res = await fetch(API + '/api/profile/notes');
        if (res.ok) rules.value = await res.json();
      } finally { loading.value = false; }
    };

    const deleteRule = async (id) => {
      if (!confirm('Delete this rule?')) return;
      const res = await fetch(API + `/api/profile/notes/${id}`, { method: 'DELETE' });
      if (res.ok) loadRules();
    };

    const categoryColor = (c) => {
      const map = { style: 'orange', architecture: 'purple', testing: 'green', docs: 'blue' };
      return map[c] || 'blue';
    };

    const copyRules = () => {
      const header = 'Category\tRule\tConfidence\tSource';
      const rows = rules.value.map(r =>
        `${r.category}\t${r.text}\t${(r.confidence * 100).toFixed(0)}%\t${r.source}`
      );
      const text = [header, ...rows].join('\n');
      navigator.clipboard.writeText(text).then(() => {
        copied.value = true;
        setTimeout(() => copied.value = false, 2000);
      }).catch(() => alert('Failed to copy to clipboard.'));
    };

    const onApplied = () => { showSynthesis.value = false; loadRules(); };

    onMounted(loadRules);

    return { rules, loading, copied, showSynthesis, categoryColor, deleteRule, copyRules, onApplied };
  }
};

const Admin = {
  template: '#admin-template',
  setup() {
    const users = ref([]);
    const idps = ref([]);
    const expandedIdp = ref(null);
    const settings = reactive({ registration_open: true });
    const showWizard = ref(false);
    const currentUser = computed(() => globalState.user || {});

    const loadUsers = async () => {
      const res = await fetch(API + '/api/admin/users');
      if (res.ok) { const data = await res.json(); users.value = data.users; }
    };

    const loadSettings = async () => {
      const res = await fetch(API + '/api/admin/settings');
      if (res.ok) { const data = await res.json(); settings.registration_open = data.registration_open; }
    };

    const toggleRegistration = async (e) => {
      const enabled = e.target.checked;
      const res = await fetch(API + '/api/admin/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ registration_open: enabled })
      });
      if (res.ok) { settings.registration_open = enabled; }
      else { e.target.checked = !enabled; alert('Failed to update setting'); }
    };

    const loadIdps = async () => {
      const res = await fetch(API + '/api/admin/idps');
      if (res.ok) { const data = await res.json(); idps.value = data.providers; }
    };

    const toggleAdmin = async (u) => {
      if (!confirm(`Are you sure you want to ${u.is_admin ? 'demote' : 'promote'} ${u.email}?`)) return;
      const res = await fetch(API + `/api/admin/users/${u.id}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ is_admin: !u.is_admin })
      });
      if (res.ok) await loadUsers(); else alert('Failed to update user');
    };

    const deleteUser = async (u) => {
      if (!confirm(`Permanently delete ${u.email} and all their data? This cannot be undone.`)) return;
      const res = await fetch(API + `/api/admin/users/${u.id}`, { method: 'DELETE' });
      if (res.ok) await loadUsers(); else alert('Failed to delete user');
    };

    const unlink = async (u, idp) => {
      if (!confirm(`Unlink ${idp.provider} from ${u.email}? They will lose access if this is their only identity.`)) return;
      const res = await fetch(API + `/api/admin/users/${u.id}/identities/${idp.provider}`, { method: 'DELETE' });
      if (res.ok) await loadUsers(); else alert('Failed to unlink identity');
    };

    const removeIdp = async (p) => {
      if (!confirm(`Remove "${p.name}" as an identity provider? Users who only have this identity will lose access.`)) return;
      const res = await fetch(API + `/api/admin/idps/${p.id}`, { method: 'DELETE' });
      if (res.ok) await loadIdps();
      else { const err = await res.json().catch(() => ({})); alert(err.detail || 'Failed to remove provider'); }
    };

    const onWizardSaved = async () => {
      showWizard.value = false;
      await loadIdps();
    };

    onMounted(() => { loadUsers(); loadIdps(); loadSettings(); });

    return { users, idps, expandedIdp, showWizard, currentUser, settings, toggleAdmin, deleteUser, unlink, removeIdp, onWizardSaved };
  }
};

const Analytics = { template: '#analytics-template' };

const DeveloperAnalytics = {
  template: '#developer-template',
  setup() {
    const loading = ref(true);
    const summary = ref({ total_interactions: 0, correction_rate: null, avg_friction: null, total_rules: 0 });
    const trend = ref([]);
    const frictionByAgent = ref([]);
    const latencyDist = ref([]);
    const ruleConfidence = ref([]);
    const ruleAccum = ref([]);
    const trendDays = ref(30);
    const accumWeeks = ref(12);

    // SVG chart constants: viewBox "0 0 620 175", margins l=45 r=10 t=10 b=35, area 565×130
    const SX = 45, EX = 610, SY = 10, EY = 140;
    const tY = (v) => EY - v * (EY - SY);
    const tX = (i, len) => SX + (len > 1 ? (i / (len - 1)) * (EX - SX) : (EX - SX) / 2);

    const trendPoints = computed(() =>
      trend.value.map((d, i) => ({ x: tX(i, trend.value.length), y: tY(d.rate), day: d.day, rate: d.rate }))
    );
    const trendPath = computed(() => {
      const pts = trendPoints.value;
      if (pts.length < 2) return '';
      return 'M ' + pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' L ');
    });
    const trendArea = computed(() => {
      const pts = trendPoints.value;
      if (pts.length < 2) return '';
      const line = pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' L ');
      return `M ${pts[0].x.toFixed(1)},${EY} L ${line} L ${pts[pts.length-1].x.toFixed(1)},${EY} Z`;
    });
    const trendXLabels = computed(() => {
      const pts = trendPoints.value;
      if (!pts.length) return [];
      const step = Math.max(1, Math.floor(pts.length / 6));
      return pts.filter((_, i) => i % step === 0 || i === pts.length - 1)
        .map(p => ({ x: p.x, day: p.day, label: p.day.slice(5) }));
    });

    const maxFriction = computed(() => Math.max(...frictionByAgent.value.map(a => a.avg_friction), 0.01));
    const maxLatency = computed(() => Math.max(...latencyDist.value.map(l => l.count), 1));
    const barPct = (v, max) => (v / max * 100).toFixed(1) + '%';

    const catColor = (c) => ({ style:'orange', architecture:'purple', testing:'green', docs:'blue' }[c] || 'blue');
    function frictionColor(v) {
      if (v === null || v === undefined || v === 0) return 'var(--muted)';
      if (v < 0.3) return 'var(--green)';
      if (v < 0.6) return 'var(--orange)';
      return 'var(--red)';
    }
    function corrColor(v) {
      if (v === null || v === undefined || v === 0) return 'var(--muted)';
      if (v < 0.2) return 'var(--green)';
      if (v < 0.5) return 'var(--orange)';
      return 'var(--red)';
    }
    function confColor(v) {
      if (v >= 0.75) return 'var(--green)';
      if (v >= 0.4) return 'var(--orange)';
      return 'var(--red)';
    }

    const loadAll = async () => {
      loading.value = true;
      try {
        const [s, t, f, l, c, a] = await Promise.all([
          fetch(API + '/api/developer/summary').then(r => r.json()),
          fetch(API + `/api/developer/trend?days=${trendDays.value}`).then(r => r.json()),
          fetch(API + '/api/developer/friction-by-agent').then(r => r.json()),
          fetch(API + '/api/developer/latency-distribution').then(r => r.json()),
          fetch(API + '/api/developer/rule-confidence').then(r => r.json()),
          fetch(API + `/api/developer/rule-accumulation?weeks=${accumWeeks.value}`).then(r => r.json()),
        ]);
        summary.value = s;
        trend.value = t;
        frictionByAgent.value = f;
        latencyDist.value = l;
        ruleConfidence.value = c;
        ruleAccum.value = a;
      } finally { loading.value = false; }
    };

    const loadTrend = async () => {
      const t = await fetch(API + `/api/developer/trend?days=${trendDays.value}`).then(r => r.json());
      trend.value = t;
    };
    const loadAccum = async () => {
      const a = await fetch(API + `/api/developer/rule-accumulation?weeks=${accumWeeks.value}`).then(r => r.json());
      ruleAccum.value = a;
    };

    onMounted(loadAll);

    return {
      loading, summary, trend, frictionByAgent, latencyDist, ruleConfidence, ruleAccum,
      trendDays, accumWeeks, tY,
      trendPoints, trendPath, trendArea, trendXLabels,
      maxFriction, maxLatency, barPct,
      catColor, frictionColor, corrColor, confColor,
      loadTrend, loadAccum,
    };
  }
};

const Memory = { template: '#memory-template' };

const routes = [
  { path: '/', redirect: '/connect' },
  { path: '/setup', component: SetupWizard },
  { path: '/login', component: Login },
  { path: '/connect', component: Connect },
  { path: '/profile', component: Profile },
  { path: '/analytics', component: Analytics },
  { path: '/developer', component: DeveloperAnalytics },
  { path: '/memory', component: Memory },
  { path: '/admin', component: Admin, meta: { requiresAdmin: true } }
];

const router = createRouter({
  history: createWebHashHistory(),
  routes,
});

// Navigation guard to enforce auth flow
router.beforeEach(async (to, from) => {
  if (globalState.loading) return true; // Let initial load handle it
  
  if (!globalState.system.has_idp && !globalState.system.single_user_mode && to.path !== '/setup') return '/setup';
  if ((globalState.system.has_idp || globalState.system.single_user_mode) && !globalState.user && to.path !== '/login' && to.path !== '/setup') return '/login';
  if (to.meta.requiresAdmin && (!globalState.user || !globalState.user.is_admin)) return '/profile';
  
  return true;
});

const App = {
  template: '#app-template',
  setup() {
    const isSetupOrLogin = computed(() => {
      const path = router.currentRoute.value.path;
      return path === '/setup' || path === '/login';
    });
    
    const logout = async () => {
      if (globalState.system.single_user_mode) return;
      await fetch(API + '/auth/logout', { method: 'POST' });
      globalState.user = null;
      router.push('/login');
    };
    
    onMounted(async () => {
      try {
        // 1. Check system status
        const status = await fetch(API + '/api/system/status').then(r => r.json());
        Object.assign(globalState.system, status);
        
        // 2. If IdPs exist or single user mode, check if we're logged in
        if (status.has_idp || status.single_user_mode) {
          const userRes = await fetch(API + '/api/me');
          if (userRes.ok) {
            globalState.user = await userRes.json();
          }
        }
      } catch (e) {
        console.error('Failed to init app', e);
      } finally {
        globalState.loading = false;
        
        // Routing logic after initial load
        if (!globalState.system.has_idp && !globalState.system.single_user_mode) {
          router.push('/setup');
        } else if (!globalState.user) {
          router.push('/login');
        } else if (router.currentRoute.value.path === '/login' || router.currentRoute.value.path === '/setup') {
          router.push('/');
        }
      }
    });
    
    return {
      loading: computed(() => globalState.loading),
      user: computed(() => globalState.user),
      system: computed(() => globalState.system),
      isSetupOrLogin,
      logout
    };
  }
};

createApp(App).use(router).component('IdpWizard', IdpWizard).component('RuleSynthesis', RuleSynthesis).mount('#app');
</script>
