<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JFYI Dashboard — Just For Your Information</title>
<script src="https://unpkg.com/vue@3.5.13/dist/vue.global.js" integrity="sha384-G++pO/TtP6SeNEBuO/CYuppmlcEhA0Rj9IcY5feVJXhyYraEA8CKVZV38iDXLTyJ" crossorigin="anonymous"></script>
<script src="https://unpkg.com/vue-router@4.5.0/dist/vue-router.global.js" integrity="sha384-k3ll1ynQm098WjllQ/lUsqPGGlfCQ0PD4T4xZmzCfXjkkT9pzpfbHb4vN9Xx+o3b" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --orange: #d29922; --red: #f85149;
    --purple: #bc8cff; --font: 'Segoe UI', system-ui, sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  .header-left { display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.4rem; font-weight: 700; color: var(--accent); cursor: pointer; }
  header span.subtitle { color: var(--muted); font-size: 0.85rem; }
  .badge { background: #1f6feb22; border: 1px solid #1f6feb55; color: var(--accent); border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; }
  
  nav { display: flex; gap: 0; padding: 0 2rem; background: var(--surface); border-bottom: 1px solid var(--border); }
  nav a { color: var(--muted); padding: 0.8rem 1.2rem; font-size: 0.9rem; border-bottom: 2px solid transparent; transition: all 0.2s; text-decoration: none; }
  nav a:hover { color: var(--text); text-decoration: none; }
  nav a.router-link-active { color: var(--accent); border-bottom-color: var(--accent); }
  
  main { max-width: 1100px; margin: 2rem auto; padding: 0 2rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: var(--text); }
  .card p.desc { color:var(--muted); font-size:0.85rem; margin-bottom:1rem; }
  
  .btn { background: var(--accent); color: #0d1117; border: none; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: opacity 0.2s; text-decoration: none; display: inline-block; text-align: center; }
  .btn:hover { opacity: 0.85; text-decoration: none; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
  .btn-danger { background: none; border: 1px solid var(--red); color: var(--red); }
  .btn-danger:hover { background: #2d121422; }
  .btn-login { width: 100%; margin-bottom: 0.5rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem; }
  
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text); }
  input[type=text], input[type=password], input[type=number], select {
    background: #21262d; border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.9rem; width: 100%;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); }
  
  .setup-container, .login-container { max-width: 520px; margin: 4rem auto; }
  .setup-container .card, .login-container .card { padding: 2rem; }
  .setup-header { text-align: center; margin-bottom: 2rem; }
  .setup-header h1 { font-size: 1.8rem; color: var(--accent); margin-bottom: 0.5rem; }
  
  .provider-select { display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; margin-bottom: 0.75rem; transition: all 0.2s; background: var(--surface); }
  .provider-select:hover { border-color: #4b535d; background: #1f2937; }
  .provider-select.active { border-color: var(--accent); background: #1f6feb11; }
  
  .guidance-box { background: #1f2937; border-left: 4px solid var(--accent); padding: 1rem 1.5rem; border-radius: 4px; margin-bottom: 1.5rem; font-size: 0.9rem; }
  .guidance-box h3 { font-size: 0.95rem; margin-bottom: 0.5rem; color: var(--text); }
  .guidance-box ol { padding-left: 1.5rem; color: var(--text); margin-bottom: 0; }
  .guidance-box li { margin-bottom: 0.4rem; }
  .guidance-box code { background: #0d1117; padding: 0.1rem 0.4rem; border-radius: 4px; font-family: monospace; color: var(--accent); font-size: 0.85em; }
  
  /* Tables & Pills from old UI */
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th { text-align: left; padding: 0.5rem 0.75rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #21262d; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1f2937; }
  .pill { display: inline-block; border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; font-weight: 500; }
  .pill-green { background: #23312a; color: var(--green); }
  .pill-orange { background: #2d2208; color: var(--orange); }
  .pill-red { background: #2d1214; color: var(--red); }
  .pill-blue { background: #132030; color: var(--accent); }
  .pill-purple { background: #231a30; color: var(--purple); }
  
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  .empty .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; color: var(--muted); gap: 1rem; }
  .spinner { border: 3px solid #21262d; border-top: 3px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app"></div>

<!-- Vue App Templates -->
<script type="text/x-template" id="app-template">
  <div v-if="loading" class="loading-screen">
    <div class="spinner"></div>
    <p>Loading JFYI...</p>
  </div>
  <div v-else>
    <header v-if="!isSetupOrLogin">
      <div class="header-left">
        <h1 @click="$router.push('/')">⚡ JFYI Dashboard</h1>
        <span class="subtitle">Just For Your Information — MCP Server &amp; Analytics Hub</span>
        <span class="badge">v2.1.1</span>
      </div>
      <div>
        <span v-if="user" style="margin-right: 1rem; font-size: 0.9rem;">
          {{ user.name || user.email }} <span v-if="user.is_admin" class="pill pill-purple">Admin</span>
        </span>
        <button v-if="!system.single_user_mode" @click="logout" class="btn btn-outline" style="padding: 0.3rem 0.7rem; font-size: 0.8rem;">Logout</button>
      </div>
    </header>
    
    <nav v-if="!isSetupOrLogin">
      <router-link to="/profile">👤 Developer Profile</router-link>
      <router-link to="/analytics">📊 Agent Analytics</router-link>
      <router-link to="/memory">🧠 Memory Explorer</router-link>
      <router-link v-if="user?.is_admin" to="/admin">🛡️ Admin</router-link>
    </nav>
    
    <main>
      <router-view></router-view>
    </main>
  </div>
</script>

<script type="text/x-template" id="setup-template">
  <div class="setup-container">
    <div class="setup-header">
      <h1>Welcome to JFYI</h1>
      <p style="color: var(--muted)">Let's set up your first Identity Provider</p>
    </div>
    
    <div class="card" v-if="step === 1">
      <h2>Step 1: Choose an Identity Provider</h2>
      <p class="desc">
        JFYI uses OAuth 2.1 to authenticate users. Select the provider you want to configure first.
      </p>
      
      <div class="form-group" style="margin-top: 1.5rem;">
        <div class="provider-select" :class="{active: form.provider === 'github'}" @click="form.provider = 'github'">
          <span style="font-size: 1.8rem">🐙</span>
          <div>
            <strong style="color: var(--text); font-size: 1.05rem;">GitHub</strong>
            <div style="font-size: 0.85rem; color: var(--muted)">Configure a GitHub OAuth App</div>
          </div>
        </div>
        
        <div class="provider-select" :class="{active: form.provider === 'google'}" @click="form.provider = 'google'">
          <span style="font-size: 1.8rem">🌐</span>
          <div>
            <strong style="color: var(--text); font-size: 1.05rem;">Google</strong>
            <div style="font-size: 0.85rem; color: var(--muted)">Configure Google Cloud OAuth</div>
          </div>
        </div>
        
        <div class="provider-select" :class="{active: form.provider === 'entra'}" @click="form.provider = 'entra'">
          <span style="font-size: 1.8rem">🏢</span>
          <div>
            <strong style="color: var(--text); font-size: 1.05rem;">Microsoft Entra ID</strong>
            <div style="font-size: 0.85rem; color: var(--muted)">Configure Azure App Registration</div>
          </div>
        </div>
      </div>
      
      <div style="margin-top: 2rem;">
        <button class="btn" style="width: 100%; padding: 0.75rem;" @click="step = 2" :disabled="!form.provider">Next Step &rarr;</button>
      </div>
    </div>
    
    <div class="card" v-if="step === 2">
      <h2>Step 2: Configure {{ providerDisplay }}</h2>
      
      <div class="guidance-box">
        <template v-if="form.provider === 'github'">
          <h3>How to get GitHub credentials:</h3>
          <ol>
            <li>Go to <strong>GitHub Settings &rarr; Developer settings &rarr; OAuth Apps</strong>.</li>
            <li>Click <strong>New OAuth App</strong>.</li>
            <li>Set <strong>Homepage URL</strong> to your JFYI root URL (e.g., <code>{{ origin }}</code>).</li>
            <li>Set <strong>Authorization callback URL</strong> to <code>{{ origin }}/auth/callback/github</code>.</li>
            <li>Click <strong>Register application</strong>.</li>
            <li>Copy the <strong>Client ID</strong> and generate a new <strong>Client secret</strong>.</li>
          </ol>
        </template>
        
        <template v-else-if="form.provider === 'google'">
          <h3>How to get Google credentials:</h3>
          <ol>
            <li>Go to the <a href="https://console.cloud.google.com" target="_blank">Google Cloud Console</a>.</li>
            <li>Navigate to <strong>APIs &amp; Services &rarr; Credentials</strong>.</li>
            <li>Click <strong>Create Credentials &rarr; OAuth client ID</strong>.</li>
            <li>Set Application type to <strong>Web application</strong>.</li>
            <li>Add an <strong>Authorized redirect URI</strong>: <code>{{ origin }}/auth/callback/google</code>.</li>
            <li>Click <strong>Create</strong> and copy the resulting Client ID and Secret.</li>
          </ol>
        </template>
        
        <template v-else-if="form.provider === 'entra'">
          <h3>How to get Entra ID (Azure) credentials:</h3>
          <ol>
            <li>Go to the <a href="https://portal.azure.com" target="_blank">Azure Portal</a> and open <strong>Microsoft Entra ID</strong>.</li>
            <li>Navigate to <strong>App registrations &rarr; New registration</strong>.</li>
            <li>Name your app (e.g. "JFYI").</li>
            <li>Set the Redirect URI type to <strong>Web</strong> with value: <code>{{ origin }}/auth/callback/entra</code>.</li>
            <li>Click <strong>Register</strong>. Copy the <strong>Application (client) ID</strong>.</li>
            <li>Go to <strong>Certificates &amp; secrets</strong>, create a new client secret, and copy its <strong>Value</strong> (not the Secret ID).</li>
          </ol>
        </template>
      </div>
      
      <form @submit.prevent="submitSetup">
        <div class="form-group">
          <label>Client ID</label>
          <input type="text" v-model="form.client_id" required placeholder="Paste Client ID here" />
        </div>
        
        <div class="form-group">
          <label>Client Secret</label>
          <input type="password" v-model="form.client_secret" required placeholder="Paste Client Secret here" />
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <button type="button" class="btn btn-outline" @click="step = 1">&larr; Back</button>
          <button type="submit" class="btn" style="flex: 1" :disabled="saving">
            {{ saving ? 'Saving...' : 'Save & Continue' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</script>

<script type="text/x-template" id="login-template">
  <div class="login-container">
    <div class="setup-header">
      <h1>Sign in to JFYI</h1>
      <p style="color: var(--muted)" v-if="system.has_admin">Welcome back.</p>
      <p style="color: var(--accent)" v-else>The first user to sign in will automatically become the Admin.</p>
    </div>
    
    <div class="card" style="text-align: center;">
      <h2 style="margin-bottom: 1.5rem;">Choose a Provider</h2>
      
      <div v-if="system.providers && system.providers.length > 0">
        <a v-for="p in system.providers" :key="p" :href="'/auth/login/' + p" class="btn btn-login btn-outline">
          <span v-if="p === 'github'">🐙</span>
          <span v-if="p === 'google'">🌐</span>
          <span v-if="p === 'entra'">🏢</span>
          Sign in with {{ p.charAt(0).toUpperCase() + p.slice(1) }}
        </a>
      </div>
      <div v-else class="empty" style="padding: 1rem;">
        No identity providers configured.
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="profile-template">
  <div>
    <div class="card">
      <h2>Your Coding DNA</h2>
      <p class="desc">Rules JFYI has learned about your development style. These are injected into your AI assistant's system prompt.</p>
      
      <div v-if="loading" class="loading-screen" style="height: 100px;">Loading rules...</div>
      <div v-else-if="rules.length === 0" class="empty">
        <div class="icon">🧬</div>No profile rules yet.
      </div>
      <div v-else>
        <table style="margin-bottom: 1rem;">
          <thead>
            <tr>
              <th>Category</th>
              <th>Rule</th>
              <th>Confidence</th>
              <th>Source</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="r in rules" :key="r.id">
              <td><span :class="'pill pill-' + categoryColor(r.category)">{{ r.category }}</span></td>
              <td>{{ r.rule }}</td>
              <td>{{ (r.confidence * 100).toFixed(0) }}%</td>
              <td><span :class="r.source === 'manual' ? 'pill pill-purple' : 'pill pill-green'">{{ r.source }}</span></td>
              <td style="text-align: right;"><button class="btn-danger" style="border:none; cursor:pointer;" @click="deleteRule(r.id)">×</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="analytics-template">
  <div>
    <div class="card">
      <h2>Agent Analytics</h2>
      <div class="empty"><div class="icon">📊</div>Analytics module coming soon.</div>
    </div>
  </div>
</script>

<script type="text/x-template" id="admin-template">
  <div>
    <div class="card">
      <h2>🛡️ Admin Dashboard</h2>
      <p class="desc">Manage users and system identity providers.</p>
    </div>
    
    <div class="card">
      <h2>Registered Users</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Identities</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="u in users" :key="u.id">
            <td>{{ u.id }}</td>
            <td>{{ u.name || '-' }}</td>
            <td>{{ u.email }}</td>
            <td>
              <span v-if="u.is_admin" class="pill pill-purple">Admin</span>
              <span v-else class="pill pill-blue">User</span>
            </td>
            <td>
              <span v-for="idp in u.identities" :key="idp.provider" class="pill pill-orange" style="margin-right:4px;">
                {{ idp.provider }}
                <button @click="unlink(u, idp)" class="btn-danger" style="margin-left: 4px; padding: 0 4px; border-radius: 4px; border:none; cursor:pointer;" title="Unlink Identity">&times;</button>
              </span>
            </td>
            <td>{{ new Date(u.created_at).toLocaleDateString() }}</td>
            <td>
              <button @click="toggleAdmin(u)" class="btn btn-outline" style="padding: 0.2rem 0.5rem; font-size: 0.75rem; margin-right: 4px;" :disabled="u.id === currentUser.id">
                {{ u.is_admin ? 'Demote' : 'Promote' }}
              </button>
              <button @click="deleteUser(u)" class="btn btn-danger" style="padding: 0.2rem 0.5rem; font-size: 0.75rem;" :disabled="u.id === currentUser.id">Delete</button>
            </td>
          </tr>
          <tr v-if="users.length === 0">
            <td colspan="7" class="empty" style="padding: 1rem;">No users found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</script>

<script type="text/x-template" id="memory-template">
  <div>
    <div class="card">
      <h2>Friction Events</h2>
      <div class="empty"><div class="icon">🧠</div>Memory module coming soon.</div>
    </div>
  </div>
</script>

<!-- Vue App Logic -->
<script>
const { createApp, ref, reactive, onMounted, computed } = Vue;
const { createRouter, createWebHashHistory } = VueRouter;

const API = '';

// Shared state
const globalState = reactive({
  system: { has_idp: false, has_admin: false, is_ready: false, providers: [], single_user_mode: false },
  user: null,
  loading: true
});

const SetupWizard = {
  template: '#setup-template',
  setup() {
    const step = ref(1);
    const form = reactive({ provider: 'github', client_id: '', client_secret: '' });
    const saving = ref(false);
    const router = VueRouter.useRouter();
    const origin = globalThis.location.origin;
    
    const providerDisplay = computed(() => {
      if (form.provider === 'github') return 'GitHub';
      if (form.provider === 'google') return 'Google';
      if (form.provider === 'entra') return 'Microsoft Entra ID';
      return '';
    });
    
    const submitSetup = async () => {
      saving.value = true;
      try {
        const res = await fetch(API + '/api/system/idp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(form)
        });
        if (res.ok) {
          // Re-fetch system status and go to login
          const status = await fetch(API + '/api/system/status').then(r => r.json());
          Object.assign(globalState.system, status);
          router.push('/login');
        } else {
          alert('Failed to configure IdP');
        }
      } catch (e) {
        console.error('Error configuring IdP', e);
        alert('Error configuring IdP');
      } finally {
        saving.value = false;
      }
    };
    
    return { step, form, saving, origin, providerDisplay, submitSetup };
  }
};

const Login = {
  template: '#login-template',
  setup() {
    return { system: globalState.system };
  }
};

const Profile = {
  template: '#profile-template',
  setup() {
    const rules = ref([]);
    const loading = ref(true);
    
    const loadRules = async () => {
      loading.value = true;
      try {
        const res = await fetch(API + '/api/profile/rules');
        if (res.ok) rules.value = await res.json();
      } finally { loading.value = false; }
    };
    
    const deleteRule = async (id) => {
      if (!confirm('Delete this rule?')) return;
      const res = await fetch(API + `/api/profile/rules/${id}`, { method: 'DELETE' });
      if (res.ok) loadRules();
    };
    
    const categoryColor = (c) => {
      const map = {style:'orange', architecture:'purple', testing:'green', docs:'blue'};
      return map[c] || 'blue';
    };
    
    onMounted(loadRules);
    
    return { rules, loading, categoryColor, deleteRule };
  }
};

const Admin = {
  template: '#admin-template',
  setup() {
    const users = ref([]);
    const currentUser = computed(() => globalState.user || {});
    
    const loadUsers = async () => {
      const res = await fetch(API + '/api/admin/users');
      if (res.ok) {
        const data = await res.json();
        users.value = data.users;
      }
    };
    
    const toggleAdmin = async (u) => {
      if (!confirm(`Are you sure you want to ${u.is_admin ? 'demote' : 'promote'} ${u.email}?`)) return;
      const res = await fetch(API + `/api/admin/users/${u.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ is_admin: !u.is_admin })
      });
      if (res.ok) {
        await loadUsers();
      } else {
        alert('Failed to update user');
      }
    };
    
    const deleteUser = async (u) => {
      if (!confirm(`Permanently delete ${u.email} and all their data? This cannot be undone.`)) return;
      const res = await fetch(API + `/api/admin/users/${u.id}`, { method: 'DELETE' });
      if (res.ok) {
        await loadUsers();
      } else {
        alert('Failed to delete user');
      }
    };

    const unlink = async (u, idp) => {
      if (!confirm(`Unlink ${idp.provider} from ${u.email}? They will lose access if this is their only identity.`)) return;
      const res = await fetch(API + `/api/admin/users/${u.id}/identities/${idp.provider}`, { method: 'DELETE' });
      if (res.ok) {
        await loadUsers();
      } else {
        alert('Failed to unlink identity');
      }
    };
    
    onMounted(loadUsers);
    
    return { users, currentUser, toggleAdmin, deleteUser, unlink };
  }
};

const Analytics = { template: '#analytics-template' };
const Memory = { template: '#memory-template' };

const routes = [
  { path: '/', redirect: '/profile' },
  { path: '/setup', component: SetupWizard },
  { path: '/login', component: Login },
  { path: '/profile', component: Profile },
  { path: '/analytics', component: Analytics },
  { path: '/memory', component: Memory },
  { path: '/admin', component: Admin, meta: { requiresAdmin: true } }
];

const router = createRouter({
  history: createWebHashHistory(),
  routes,
});

// Navigation guard to enforce auth flow
router.beforeEach(async (to, from) => {
  if (globalState.loading) return true; // Let initial load handle it
  
  if (!globalState.system.has_idp && !globalState.system.single_user_mode && to.path !== '/setup') return '/setup';
  if ((globalState.system.has_idp || globalState.system.single_user_mode) && !globalState.user && to.path !== '/login' && to.path !== '/setup') return '/login';
  if (to.meta.requiresAdmin && (!globalState.user || !globalState.user.is_admin)) return '/profile';
  
  return true;
});

const App = {
  template: '#app-template',
  setup() {
    const isSetupOrLogin = computed(() => {
      const path = router.currentRoute.value.path;
      return path === '/setup' || path === '/login';
    });
    
    const logout = async () => {
      if (globalState.system.single_user_mode) return;
      await fetch(API + '/auth/logout', { method: 'POST' });
      globalState.user = null;
      router.push('/login');
    };
    
    onMounted(async () => {
      try {
        // 1. Check system status
        const status = await fetch(API + '/api/system/status').then(r => r.json());
        Object.assign(globalState.system, status);
        
        // 2. If IdPs exist or single user mode, check if we're logged in
        if (status.has_idp || status.single_user_mode) {
          const userRes = await fetch(API + '/api/me');
          if (userRes.ok) {
            globalState.user = await userRes.json();
          }
        }
      } catch (e) {
        console.error('Failed to init app', e);
      } finally {
        globalState.loading = false;
        
        // Routing logic after initial load
        if (!globalState.system.has_idp && !globalState.system.single_user_mode) {
          router.push('/setup');
        } else if (!globalState.user) {
          router.push('/login');
        } else if (router.currentRoute.value.path === '/login' || router.currentRoute.value.path === '/setup') {
          router.push('/');
        }
      }
    });
    
    return {
      loading: computed(() => globalState.loading),
      user: computed(() => globalState.user),
      system: computed(() => globalState.system),
      isSetupOrLogin,
      logout
    };
  }
};

createApp(App).use(router).mount('#app');
</script>
</body>
</html>
