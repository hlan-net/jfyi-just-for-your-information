version: "3.9"

services:
  jfyi:
    build: .
    image: ghcr.io/hlan-net/jfyi-just-for-your-information:latest
    container_name: jfyi-mcp-server
    ports:
      - "8080:8080"
    volumes:
      - jfyi-data:/data
    environment:
      JFYI_DATA_DIR: /data
      JFYI_DB_PATH: /data/jfyi.db
      JFYI_MCP_PORT: "8080"
      JFYI_SENTENCE_TRANSFORMERS_HOME: /data/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/profile/rules')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  jfyi-data:
    driver: local
